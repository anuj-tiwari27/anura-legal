services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: anura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anura
      POSTGRES_PASSWORD: anura
      POSTGRES_DB: anura
    ports:
      - "5442:5432"
    volumes:
      - anura-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anura -d anura"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: anura-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - anura-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local S3-compatible object storage (Cloudflare R2 / AWS S3 stand-in for dev).
  # In production, point STORAGE_* env vars at R2 or S3 instead.
  minio:
    image: minio/minio:latest
    container_name: anura-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: anura
      MINIO_ROOT_PASSWORD: anura-secret
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - anura-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the default bucket on startup so uploads work out of the box.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 anura anura-secret;
      mc mb --ignore-existing local/anura-documents;
      mc anonymous set download local/anura-documents;
      exit 0;
      "

volumes:
  anura-pgdata:
  anura-redisdata:
  anura-miniodata:
